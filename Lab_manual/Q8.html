<!DOCTYPE html>
<html>
<head>
    <title>Map Function Example</title>
</head>
<body>

<h2>Square of Array Elements</h2>

<script>

let numbers = [1, 2, 3, 4, 5];

// map function using arrow function
let square = numbers.map(num => num * num);

document.write("Original Array: " + numbers + "<br>");
document.write("Square Array: " + square);

</script>

</body>
</html>
