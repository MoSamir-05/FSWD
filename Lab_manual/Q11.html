<!DOCTYPE html>
<html>
<head>
    <title>Odd Even using Map</title>
</head>
<body>

<h2>Check Odd or Even</h2>

<script>

// Original Array
let numbers = [1, 2, 3, 4, 5, 6];

// Using map()
let result = numbers.map(num => 
    num % 2 === 0 ? num + " is Even" : num + " is Odd"
);

document.write("Original Array: " + numbers + "<br><br>");
document.write("Result:<br>");

result.forEach(item => document.write(item + "<br>"));

</script>

</body>
</html>
