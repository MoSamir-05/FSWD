<!DOCTYPE html>
<html>
<head>
    <title>Prime Check using Map</title>
</head>
<body>

<h2>Check Prime Numbers</h2>

<script>

// Original Array
let numbers = [2, 3, 4, 5, 6, 7];

// Prime check function
const isPrime = (n) => {

    if (n <= 1) return false;

    for (let i = 2; i <= Math.sqrt(n); i++) {
        if (n % i === 0) {
            return false;
        }
    }
    return true;
};

// Using map()
let result = numbers.map(num => 
    isPrime(num) ? num + " is Prime" : num + " is Not Prime"
);

document.write("Original Array: " + numbers + "<br><br>");
document.write("Result:<br>");
result.forEach(item => document.write(item + "<br>"));

</script>

</body>
</html>
