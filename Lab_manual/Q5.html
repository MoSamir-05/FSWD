<!DOCTYPE html>
<html>
<head>
    <title>Arrow Functions</title>
</head>
<body>

<h2>Arithmetic Operations using Arrow Functions</h2>

<script>

// Addition
const add = (a, b) => a + b;

// Subtraction
const subtract = (a, b) => a - b;

// Multiplication
const multiply = (a, b) => a * b;

// Division
const divide = (a, b) => a / b;

// Modulus
const modulus = (a, b) => a % b;


// Testing
document.write("Addition: " + add(10, 5) + "<br>");
document.write("Subtraction: " + subtract(10, 5) + "<br>");
document.write("Multiplication: " + multiply(10, 5) + "<br>");
document.write("Division: " + divide(10, 5) + "<br>");
document.write("Modulus: " + modulus(10, 5) + "<br>");

</script>

</body>
</html>
